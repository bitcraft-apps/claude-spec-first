name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "framework/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".claude-plugin/**"
  push:
    branches: [main]
    paths:
      - "framework/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".claude-plugin/**"

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared environment variables
  PROJECT_ROOT: ${{ github.workspace }}
  GITHUB_WORKSPACE: ${{ github.workspace }}

jobs:
  tests:
    name: Tests (${{ matrix.test-type }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [unit, integration, e2e]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache test dependencies
        uses: actions/cache@v4
        with:
          path: |
            tests/bats-core
          key: bats-${{ hashFiles('**/.gitmodules') }}
          restore-keys: |
            bats-

      - name: Setup test environment
        run: |
          echo "Setting up test environment for ${{ matrix.test-type }} tests..."

          # Ensure submodules are properly initialized
          git submodule update --init --recursive

          # Make scripts executable
          chmod +x tests/run-tests.sh
          chmod +x tests/bats-core/bin/bats
          chmod +x scripts/version.sh
          chmod +x scripts/check-version-changes.sh
          chmod +x scripts/check-version-requirements.sh
          chmod +x framework/validate-framework.sh

      - name: Run ${{ matrix.test-type }} tests
        id: test-execution
        run: |
          echo "Running ${{ matrix.test-type }} test suite..."
          cd tests
          ./run-tests.sh --verbose --tap --${{ matrix.test-type }}

      - name: Generate test summary
        if: always()
        run: |
          echo "## ${{ matrix.test-type }} Test Results" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ steps.test-execution.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test Type**: ${{ matrix.test-type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runner**: Ubuntu Latest" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date)" >> $GITHUB_STEP_SUMMARY

  plugin-validation:
    name: Plugin Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          echo "Validating .claude-plugin/plugin.json..."
          if ! jq empty .claude-plugin/plugin.json 2>/dev/null; then
            echo "FAIL: plugin.json is not valid JSON"
            exit 1
          fi
          for field in name description version; do
            if ! jq -e "has(\"$field\")" .claude-plugin/plugin.json > /dev/null 2>&1; then
              echo "FAIL: plugin.json missing required field: $field"
              exit 1
            fi
          done
          echo "PASS: plugin.json is valid"

      - name: Validate hooks.json
        run: |
          echo "Validating framework/hooks/hooks.json..."
          if ! jq empty framework/hooks/hooks.json 2>/dev/null; then
            echo "FAIL: hooks.json is not valid JSON"
            exit 1
          fi
          echo "PASS: hooks.json is valid"

      - name: Validate skill files exist
        run: |
          echo "Checking framework/skills/*/SKILL.md..."
          count=0
          for f in framework/skills/*/SKILL.md; do
            if [ ! -f "$f" ]; then
              echo "FAIL: no SKILL.md files found"
              exit 1
            fi
            echo "  Found: $f"
            count=$((count + 1))
          done
          echo "PASS: $count skill files found"

      - name: Validate agent files exist
        run: |
          echo "Checking framework/agents/*.md..."
          count=0
          for f in framework/agents/*.md; do
            if [ ! -f "$f" ]; then
              echo "FAIL: no agent .md files found"
              exit 1
            fi
            echo "  Found: $f"
            count=$((count + 1))
          done
          echo "PASS: $count agent files found"

  format-checks:
    name: Format Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          failed=0
          for f in framework/skills/*/SKILL.md; do
            echo "Checking $f..."
            # Extract frontmatter (between first and second ---)
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$f")
            for field in name description; do
              if ! echo "$frontmatter" | grep -q "^${field}:"; then
                echo "  FAIL: missing '$field' in frontmatter"
                failed=1
              fi
            done
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "PASS: all SKILL.md files have required frontmatter"

      - name: Validate agent frontmatter
        run: |
          failed=0
          for f in framework/agents/*.md; do
            echo "Checking $f..."
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$f")
            for field in name description tools; do
              if ! echo "$frontmatter" | grep -q "^${field}:"; then
                echo "  FAIL: missing '$field' in frontmatter of $f"
                failed=1
              fi
            done
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "PASS: all agent files have required frontmatter"

      - name: Validate agent prompt length
        run: |
          failed=0
          for f in framework/agents/*.md; do
            # Count lines after frontmatter (after second ---)
            body_lines=$(awk 'BEGIN{n=0} /^---$/{n++; next} n>=2{print}' "$f" | wc -l)
            body_lines=$((body_lines))
            if [ "$body_lines" -gt 50 ]; then
              echo "FAIL: $f has $body_lines body lines (max 50)"
              failed=1
            else
              echo "OK: $f has $body_lines body lines"
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "PASS: all agents under 50 body lines"

      - name: Check for placeholder text
        run: |
          failed=0
          for f in framework/agents/*.md framework/skills/*/SKILL.md; do
            # Strip inline code spans before checking for placeholders
            if sed 's/`[^`]*`//g' "$f" | grep -qE '\bTODO\b|\bTBD\b|\bPLACEHOLDER\b'; then
              echo "FAIL: placeholder text found in $f"
              sed 's/`[^`]*`//g' "$f" | grep -nE '\bTODO\b|\bTBD\b|\bPLACEHOLDER\b'
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "PASS: no placeholder text found"
