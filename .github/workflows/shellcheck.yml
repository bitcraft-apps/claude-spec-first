name: ShellCheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: |
          find . -name '*.sh' \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './tests/bats-core/*' \
            | xargs shellcheck -x
